      <circle cx="40" cy="40" r="6" fill="none" stroke="#C8553D" stroke-width="1.2" opacity="0.55"></circle>
      <g stroke="#C8553D" stroke-width="1.2" stroke-linecap="round" opacity="0.45">
        <line x1="40" y1="22" x2="40" y2="28"></line>
        <line x1="40" y1="52" x2="40" y2="58"></line>
        <line x1="22" y1="40" x2="28" y2="40"></line>
